# 太初命理 - Nginx配置文件
# 单域名部署方案：同时支持前端、API、后台管理

# HTTP重定向到HTTPS
server {
    listen 80;
    server_name taichu.chat;
    return 301 https://$server_name$request_uri;
}

# HTTPS主配置
server {
    listen 443 ssl http2;
    server_name taichu.chat;

    # SSL证书配置（请替换为你的证书路径）
    ssl_certificate /etc/nginx/ssl/taichu.chat.crt;
    ssl_certificate_key /etc/nginx/ssl/taichu.chat.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 日志配置
    access_log /var/www/taichu/logs/nginx-access.log;
    error_log /var/www/taichu/logs/nginx-error.log;

    # ============================================
    # 1. 前端网站 (主站点)
    # ============================================
    location / {
        root /var/www/taichu/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 不缓存HTML（确保更新及时生效）
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
        
        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
            expires 6M;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ============================================
    # 2. 后台管理 (可选子路径部署)
    # ============================================
    # 方式A：子路径（推荐）
    location ^~ /maodou/ {
        alias /var/www/taichu/admin/dist/;
        try_files $uri $uri/ /maodou/index.html;
        index index.html;
        
        # 添加基本认证（可选）
        # auth_basic "Admin Access";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }
    
    # 方式B：独立后台管理（如果后台是独立项目）
    # location ^~ /maodou/ {
    #     proxy_pass http://127.0.0.1:3001;  # 后台管理Node服务
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # ============================================
    # 3. API接口转发
    # ============================================
    location /api/ {
        # 跨域配置（如前端和后端不同域）
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization" always;
        
        # 处理预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Credentials true;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }

        # 转发到PHP-FPM（推荐）
        root /var/www/taichu/backend/public;
        index index.php;
        
        # 重写规则
        rewrite ^/api/(.*)$ /$1 break;
        
        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;  # 根据PHP版本调整
            # fastcgi_pass 127.0.0.1:9000;  # TCP方式
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            
            # 传递真实IP
            fastcgi_param REMOTE_ADDR $remote_addr;
            fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
            fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        }
        
        # 或者使用代理转发到PHP内置服务器（开发环境）
        # proxy_pass http://127.0.0.1:8080/;
        # proxy_set_header Host $host;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # 4. 静态资源（上传文件）
    # ============================================
    location /uploads/ {
        alias /var/www/taichu/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # 防盗链（可选）
        # valid_referers none blocked taichu.chat *.taichu.chat;
        # if ($invalid_referer) {
        #     return 403;
        # }
    }

    # ============================================
    # 5. 安全与优化
    # ============================================
    
    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ /(README|CHANGELOG|LICENSE|composer\.(json|lock)) {
        deny all;
    }
    
    location ~* \.(git|svn|hg|env|log|sql)$ {
        deny all;
    }
    
    # PHP文件禁止直接访问（除了入口文件）
    location ~* ^/(backend|api)/.*\.php$ {
        deny all;
    }

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # 内容安全策略（根据需要调整）
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' /api;" always;
}

